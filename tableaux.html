<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Les tableaux</title>
</head>
<body>
	<table border="1">
		<tr>
			<td>Html</td>
			<td>Css</td>
			<td>Js</td>
		</tr>
		<tr>
			<td>C#</td>
			<td>C++</td>
			<td>Php</td>
		</tr>
		<tr>
			<td>Java</td>
			<td>Note Js</td>
			<td>Wordpress</td>
		</tr>
	</table>

	<!-- Tableau avec des fusions -->
	<table border="1">
		<tr>
			<td>Html</td>
			<td rowspan="2">Laravel</td>
			<td colspan="2">Gemini</td>
		</tr>
		<tr>
			<td rowspan="2">Angular</td>
			<td colspan="2">Bolt</td>
		</tr>
		<tr>
			<td rowspan="2">Claude ai</td>
			<td rowspan="2">JS</td>
			<td rowspan="2">Java</td>
		</tr>
		<tr>
			<td>cursor</td>
		</tr>
	</table>
</body>
</html>
