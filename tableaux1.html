<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>
<body>
	<table border="">
		<!-- premiere ligne -->
		<tr>
			<td rowspan="2" colspan="2" height="40" bgcolor="red">Rouge</td>
			<td bgcolor="black">Noir</td>
			<td colspan="3" bgcolor="purple">Violet</td>
		</tr>
		<!-- deuxieme ligne -->
		<tr>
			<td colspan="2" rowspan="3" bgcolor="green">Vert</td>
			<td rowspan="3" bgcolor="yellow">Jaune</td>
			<td rowspan="2" height="30" bgcolor="skyblue"> Bleu ciel</td>
		</tr>
		<!-- troisieme ligne -->
		<tr>
			<td colspan="2" rowspan="2" bgcolor="orange">Orange</td>
		</tr>
		<!-- quatrieme ligne -->
		<tr>
			<td bgcolor="pink">Rose</td>
		</tr>
		<!-- cinquieme ligne -->
		<tr>
			<td bgcolor="blue">Bleu</td>
			<td colspan="2" bgcolor="grey">Gris</td>
			<td colspan="3" align="center" bgcolor="brown">Marron</td>
		</tr>
	</table>
</body>
</html>
