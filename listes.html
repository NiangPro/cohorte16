<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Listes</title>
</head>
<body>
	<h1>Listes ordonnees (1, a, A, i et I)</h1>
	<ol type="A" start="9">
		<li>Introduction</li>
		<li>Developpement</li>
		<li>Conclusion</li>
	</ol>

	<h1>Listes non ordonnees (disc, square et circle)</h1>
	<ul type="circle">
		<li>Introduction</li>
		<li>Developpement</li>
		<li>Conclusion</li>
	</ul>
</body>
</html>
