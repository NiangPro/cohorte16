<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Les listes</title>
</head>
<body>
	<!-- listes triees -->
	<ol>
		<li>Html</li>
		<li>Css</li>
		<li>Js</li>
	</ol>
	<ol type="I" start="4">
		<li>Html</li>
		<li>Css</li>
		<li>Js</li>
	</ol>

	<!-- Listes non triees type disc(par defaut) -->
	<ul>
		<li>Html</li>
		<li>Css</li>
		<li>Js</li>
	</ul>

	<ul type="square">
		<li>Html</li>
		<li>Css</li>
		<li>Js</li>
	</ul>

	<ul type="circle">
		<li>Html</li>
		<li>Css</li>
		<li>Js</li>
	</ul>
</body>
</html>
